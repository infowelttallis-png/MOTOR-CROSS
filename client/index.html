<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>MX KENYA | Kenya's Premier Motocross Championship</title>
    <meta
      name="description"
      content="Kenya's premier motocross championship featuring the best riders in East Africa at Jamhuri Showgrounds."
    />

    <!-- Simple Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- Bootstrap CSS (normal load) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Fonts (normal load) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap"
      rel="stylesheet"
    />

    <!-- Simple inline style to hide loader after load -->
    <style>
      #loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s;
      }

      .loader-text {
        font-family: "Orbitron", sans-serif;
        color: #fff;
        font-size: 3rem;
        font-weight: 900;
      }

      .loader-text span {
        color: #ff6600;
      }

      body.loaded #loader {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>

  <body>
    <!-- Simple Loader -->
    <div id="loader">
      <h1 class="loader-text">MOTO<span>CROSS</span></h1>
    </div>

    <!-- React Root -->
    <div id="root"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Simple loader removal -->
    <script>
      window.addEventListener("load", () => {
        setTimeout(() => {
          document.body.classList.add("loaded");
        }, 300);
      });
    </script>
  </body>
</html>
