    <!-- Critical inline CSS for loader only -->
    <style>
      /* Loader - minimal critical CSS */
      #loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition:
          opacity 0.5s ease-out,
          visibility 0.5s;
      }

      .loader-text {
        font-family: "Orbitron", sans-serif;
        color: #ffffff;
        font-size: clamp(2rem, 10vw, 5rem);
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -2px;
        font-style: italic;
        margin: 0;
        animation: glitch 1.2s infinite;
      }

      .loader-text span {
        color: #ff6600;
        text-shadow: 0 0 20px rgba(255, 102, 0, 0.4);
      }

      .loader-bar {
        width: 200px;
        height: 3px;
        background: rgba(255, 255, 255, 0.1);
        margin-top: 10px;
        position: relative;
        overflow: hidden;
        transform: skewX(-20deg);
      }

      .loader-bar::after {
        content: "";
        position: absolute;
        left: -100%;
        width: 100%;
        height: 100%;
        background: #ff6600;
        animation: race 1s infinite linear;
      }

      @keyframes race {
        0% {
          left: -100%;
        }
        100% {
          left: 100%;
        }
      }

      @keyframes glitch {
        0% {
          transform: skewX(-15deg);
        }
        50% {
          transform: skewX(-20deg);
          opacity: 0.8;
        }
        100% {
          transform: skewX(-15deg);
        }
      }

      body.loaded #loader {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Hide loader if JS fails */
      .no-js #loader {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="loader">
      <h1 class="loader-text">MOTO<span>CROSS</span></h1>
      <div class="loader-bar"></div>
    </div>

    <div id="root"></div>

    <!-- Defer non-critical JavaScript -->
    <script>
      // Mark if JS is enabled
      document.documentElement.className =
        document.documentElement.className.replace("no-js", "js");

      // Handle loader dismissal
      window.addEventListener("load", () => {
        setTimeout(() => {
          document.body.classList.add("loaded");
        }, 500);
      });

      // Prefetch results page for faster navigation
      setTimeout(() => {
        const prefetch = document.createElement("link");
        prefetch.rel = "prefetch";
        prefetch.href = "/src/components/sections/resultsSection.js";
        document.head.appendChild(prefetch);
      }, 3000);
    </script>

    <!-- Defer Bootstrap JS with async -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
      defer
    ></script>

    <!-- Main app script - use module with defer -->
    <script type="module" src="/src/main.jsx" defer></script>

    <!-- Add noscript fallback -->
    <noscript>

        Please enable JavaScript to experience the full MX Kenya website.
      </div>
    </noscript>
